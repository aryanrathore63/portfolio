<section class="hero" id="hero" #heroSection>
  <!-- Three.js Canvas -->
  <canvas #threeCanvas class="three-canvas"></canvas>

  <!-- Hero Content -->
  <div class="hero-content" [@heroEnter] #heroContent>
    <div class="hero-text">
      <p class="hero-greeting">Hello, I'm</p>
      <h1 class="hero-name">{{ developer.name }}</h1>
      <div class="hero-role">
        <span class="role-text">{{ typewriterText }}</span>
        <span class="cursor"></span>
      </div>
      <p class="hero-tagline">{{ developer.tagline }}</p>
    </div>

    <!-- CTA Buttons -->
    <div class="hero-actions" #heroActions>
      <a href="assets/cv.pdf" download="Aryan_Rathore_CV.pdf" class="btn btn-primary">
        <span>Download CV</span>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </a>
      <a routerLink="/" fragment="contact" class="btn btn-secondary">
        <span>Get In Touch</span>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </a>
    </div>

    <!-- Social Links -->
    <div class="hero-social">
      <a [href]="developer.linkedin" target="_blank" rel="noopener noreferrer" class="social-link"
        aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
          <rect x="2" y="9" width="4" height="12"></rect>
          <circle cx="4" cy="4" r="2"></circle>
        </svg>
      </a>
      <a [href]="developer.github" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="GitHub">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
          </path>
        </svg>
      </a>
      <a [href]="'mailto:' + developer.email" class="social-link" aria-label="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </a>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="scroll-indicator" [class.hidden]="!showScrollIndicator" (click)="scrollToProjects()"
    style="cursor: pointer;">
    <div class="scroll-mouse">
      <div class="scroll-wheel"></div>
    </div>
    <span class="scroll-text">Scroll Down</span>
  </div>
</section>

<!-- Include all other sections on the Home page for a seamless scrolling experience -->
<app-about></app-about>
<app-skills></app-skills>
<app-experience></app-experience>
<app-projects></app-projects>
<app-contact></app-contact>
